[Settings]
; Frame generation inserts generated frames between rendered frames for smoother animation.
; Changes made in MCM are written to Data\MCM\Settings\FrameGen.ini and take effect on the next game start.

; Enable frame generation.
; Default: 1 (true)
bFrameGenerationMode = true

; Enable frame rate limiting when frame generation is active and VSync is disabled.
; Default: 1 (true)
bFrameLimitMode = true

[Debug]
; Enables detailed integration logs in Debug builds.
; Release builds ignore this and keep logs concise.
; Default: 0 (false)
bDebugLogging = false

; Streamline SDK log verbosity. 0=Off, 1=Default, 2=Verbose. FO4CS_STREAMLINE_LOG_LEVEL overrides this.
; Default: 0
iStreamlineLogLevel = 0

; Number of Present frames to trace when debug logging is enabled in Debug builds.
; Default: 240
iDebugFrameLogCount = 240
