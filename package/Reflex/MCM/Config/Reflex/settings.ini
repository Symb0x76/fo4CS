[Settings]
; NVIDIA Reflex low latency mode for the standalone Reflex plugin.
; Changes made in MCM are written to Data\MCM\Settings\Reflex.ini and take effect on the next game start.

; 0 = Disabled, 1 = Low Latency, 2 = Low Latency + Boost.
; Default: 1
iReflexMode = 1

; Call Reflex sleep once per presented frame through the D3D12 proxy path.
; Default: 1 (true)
bReflexSleepMode = true
