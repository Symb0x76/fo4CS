[Settings]
; Upscaling reconstructs lower resolutions to the native resolution using advanced algorithms, improving image quality and performance.
; AMD Robust Contrast Adaptive Sharpening improves image clarity, even when upscaling is disabled or in 3D menus.
; When ENBSeries is active, only DLAA is available.
; Changes made in MCM are written to Data\MCM\Settings\Upscaler.ini and take effect on the next game start.

; NVIDIA DLSS is automatically used if available, otherwise AMD FSR is used.
; Default: 2 (0 = Disabled, 1 = FSR, 2 = DLSS)
iUpscaleMethodPreference = 2

; Controls the internal resolution.
; Default: 1 (1=Quality, 2=Balanced, 3=Performance, 4=Ultra Performance, 0=Native AA)
iQualityMode = 1

; DLSS preset override (NVIDIA DLSS only).
; 0  = Auto — let DLSS select the best preset per quality mode
; 10 = Preset J — slightly less ghosting at the cost of extra flickering
; 11 = Preset K — default for DLAA/Balanced/Quality. Transformer model, best image quality at higher perf cost
; 12 = Preset L — default for UltraPerformance. Sharper, more stable image with less ghosting than J/K. Higher perf cost
; 13 = Preset M — default for Performance. Similar quality to L but closer to J/K in speed
; Default: 0
iDLSSPreset = 0
