[Settings]
; HDR display output mode for the standalone HDR plugin and shared D3D12 proxy path.
; Changes made in MCM are written to Data\MCM\Settings\HDR.ini and take effect on the next game start.

; 0 = Disabled, 1 = scRGB, 2 = HDR10.
; Use 1 (scRGB) for Win11 native HDR with best compatibility.
; Use 2 (HDR10) for standard PQ HDR output when your display supports HDR10.
; Default: 0
iHDRMode = 0

; HDR10 peak luminance in nits.
; Check your display specs or Windows Settings > Display > Advanced Display > Peak brightness.
; Common values: HDR600=600, OLED TV=800, HDR1000/QD-OLED=1000-2000.
; Default: 1000.0
fPeakLuminance = 1000.0

; HDR10 paper white luminance in nits.
; Controls SDR UI/HUD brightness inside the HDR frame.
; Dark room: 80-150, normal indoor lighting: 200, bright room: 250-400.
; Default: 200.0
fPaperWhiteLuminance = 200.0

; scRGB reference white luminance in nits.
; 80 nits is the sRGB standard reference white. Usually leave unchanged unless calibrated.
; Default: 80.0
fScRGBReferenceLuminance = 80.0

; Interactive calibration overlay.
; MCM sets this to true when the Open Calibration Preview button is pressed.
; The in-game ImGui overlay sets it back to false after Save & Close or Cancel.
; Default: false
bCalibrationActive = false
